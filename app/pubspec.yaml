name: surface_sensor
description: BLE Accelerometer Recorder – XIAO nRF52840 Sense

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.35.3

  # State Management
  provider: ^6.1.2

  # Dateisystem
  path_provider: ^2.1.3

  # Charting
  fl_chart: ^0.69.0

  # Berechtigungen
  permission_handler: ^11.3.1

  # GPS
  geolocator: ^13.0.0

  # Karte (OpenStreetMap, kein API-Key erforderlich)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Datei-Sharing (PC-Übertragung, AirDrop, etc.)
  share_plus: ^10.1.4

  # Android Foreground Service: verhindert Prozess-Kill bei 5h-Aufnahmen im Hintergrund
  flutter_foreground_task: ^8.13.0

  # Test-Modus: Handy-IMU als Sensor-Ersatz
  sensors_plus: ^7.0.0

  # BLE Peripheral (Relay-Modus: Phone als Garmin-Relay)
  bluetooth_low_energy: ^6.0.0

  # Backend (Supabase: Auth, Datenbank, Storage)
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.svg"
  min_sdk_android: 21
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/icon/app_icon.svg"
